services:
  # Infra only — the inference app is a separate Dokploy Application on dokploy-network.
  postgres:
    image: postgres:17.4-alpine3.21
    restart: always
    env_file:
      - .env
    volumes:
      - libertai_inference_pg_data:/var/lib/postgresql/data
    networks:
      default:
      dokploy-network:
        # Stable DNS name for the inference Dokploy Application (POSTGRES_HOST=inference-postgres).
        aliases:
          - inference-postgres

  # Keeps the MaxMind GeoLite2-Country DB fresh in a shared volume for IP->currency
  # detection. Account id + license key come from a free MaxMind account (Dokploy env).
  # If the creds are missing/wrong this container errors but inference is unaffected:
  # geo.py falls back to USD until the file appears, then self-heals.
  geoipupdate:
    image: ghcr.io/maxmind/geoipupdate:latest
    restart: unless-stopped
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=${GEOIPUPDATE_ACCOUNT_ID}
      - GEOIPUPDATE_LICENSE_KEY=${GEOIPUPDATE_LICENSE_KEY}
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-Country
      - GEOIPUPDATE_FREQUENCY=72 # hours between refreshes
    volumes:
      - geoip_data:/usr/share/GeoIP

networks:
  dokploy-network:
    external: true

volumes:
  libertai_inference_pg_data:
  geoip_data:
